<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>PRL Prep</title>
  <!-- App icon: browser tab favicon + iOS "Add to Home Screen" touch icon (laser/optics mark) -->
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png?v=1">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png?v=1">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png?v=1">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0e1013">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PRL Prep">
  <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="topbar-title">
        <img class="topbar-mark" src="icons/favicon-32.png?v=1" alt="" width="28" height="28">
        <span>PRL Prep</span>
        <span class="topbar-date" id="topbar-sub"></span>
      </div>
      <div class="topbar-actions">
        <button id="btn-framework" class="ghost" title="The standard project framework you pitch to every researcher">Project framework</button>
        <button id="btn-export" class="ghost" title="Download your statuses, notes and edits as a backup">Export</button>
        <button id="btn-import" class="ghost" title="Restore from a backup file">Import</button>
        <input type="file" id="import-file" accept=".json" hidden>
      </div>
    </header>

    <div id="framework-banner" class="framework-banner" hidden></div>
    <div id="imported-banner" class="note-banner imported-banner"></div>

    <section class="stats" id="stats"></section>

    <div class="prog-filters" id="filters"></div>

    <main id="leads"></main>

    <footer class="footer">
      <p id="footer-note"></p>
    </footer>
  </div>

  <script src="js/data.js?v=1"></script>
  <script src="js/app.js?v=2"></script>
</body>
</html>
